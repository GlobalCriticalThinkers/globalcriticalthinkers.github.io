<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="thankYou.meta.title">Thank You — Global Critical Thinkers</title>
  <meta name="description" content="Your message has been sent to the Global Critical Thinkers team." data-i18n-content="thankYou.meta.description">
  <meta name="robots" content="noindex">

  <link rel="icon" href="images/logo.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <a class="skip-link" href="#main" data-i18n="nav.skip">Skip to content</a>

  <header class="site-header" id="siteHeader">
    <div class="site-header__inner">
      <a href="index.html" class="site-header__logo">
        <img src="images/logo-horizontal.png" alt="Global Critical Thinkers" class="site-header__logo-img" data-i18n-alt="brand.logoAlt">
      </a>

      <nav class="site-nav" aria-label="Primary">
        <a href="index.html" class="site-nav__link" data-i18n="nav.home">Home</a>
        <a href="about.html" class="site-nav__link" data-i18n="nav.about">About</a>
      </nav>

      <div class="site-header__actions">
        <div class="lang-switch" role="group" aria-label="Language switcher">
          <button type="button" class="lang-switch__btn is-active" data-lang="en" aria-pressed="true">EN</button>
          <span class="lang-switch__divider" aria-hidden="true">|</span>
          <button type="button" class="lang-switch__btn" data-lang="id" aria-pressed="false">ID</button>
        </div>
        <a href="index.html#registration" class="site-header__cta" data-i18n="nav.register">Register now</a>
        <div class="nav-pop">
          <button type="button" class="site-nav__toggle" id="navToggle" aria-label="Open menu" aria-expanded="false" aria-controls="navMobile">
            <span class="site-nav__toggle-icon"></span>
          </button>
          <div class="nav-pop__panel" id="navMobile" role="menu">
            <a href="index.html" class="nav-pop__link" role="menuitem" data-i18n="nav.home">Home</a>
            <a href="about.html" class="nav-pop__link" role="menuitem" data-i18n="nav.about">About</a>
            <a href="index.html#registration" class="nav-pop__cta" role="menuitem" data-i18n="nav.register">Register now</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main id="main">
    <section class="thank-you-section" aria-labelledby="thank-you-heading">
      <div class="container">
        <p class="eyebrow thank-you__eyebrow" data-i18n="thankYou.eyebrow">Message sent</p>
        <h1 id="thank-you-heading" class="thank-you__title" data-i18n="thankYou.title">Thank You</h1>
        <p class="thank-you__copy" data-i18n="thankYou.copy1">Your message has been successfully sent.</p>
        <p class="thank-you__copy" data-i18n="thankYou.copy2">Our team will review your inquiry and respond within one business day.</p>
        <div class="thank-you__action">
          <a href="index.html" class="btn btn--gold" data-i18n="thankYou.cta">Return to Home</a>
        </div>
      </div>
    </section>
  </main>

  <script src="js/translations.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/script.js" defer></script>
</body>
</html>
