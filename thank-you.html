<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="thankYou.meta.title">Thank You — Global Critical Thinkers</title>
  <meta name="description" content="Your message has been sent to the Global Critical Thinkers team." data-i18n-content="thankYou.meta.description">
  <meta name="robots" content="noindex">

  <link rel="icon" href="images/logo.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="thank-you" data-footer="none">

  <a class="skip-link" href="#main" data-i18n="nav.skip">Skip to content</a>

  <header class="site-header" id="siteHeader" data-layout="header"></header>

  <main id="main">
    <section class="thank-you-section" aria-labelledby="thank-you-heading">
      <div class="container">
        <p class="eyebrow thank-you__eyebrow" data-i18n="thankYou.eyebrow">Message sent</p>
        <h1 id="thank-you-heading" class="thank-you__title" data-i18n="thankYou.title">Thank You</h1>
        <p class="thank-you__copy" data-i18n="thankYou.copy1">Your message has been successfully sent.</p>
        <p class="thank-you__copy" data-i18n="thankYou.copy2">Our team will review your inquiry and respond within one business day.</p>

        <!-- Registration Number — populated from ?reg= query param set by
             registration-step2.js on redirect. Scoped styles only, reusing
             the existing gold/navy palette and Fraunces/Montserrat fonts
             already loaded on this page; no new design system. -->
        <div class="thank-you__reg-number" id="thankYouRegNumber" hidden>
          <p class="thank-you__reg-number-label">Registration Number</p>
          <p class="thank-you__reg-number-value" id="thankYouRegNumberValue"></p>
        </div>

        <div class="thank-you__action">
          <a href="index.html" class="btn btn--gold" data-i18n="thankYou.cta">Return to Home</a>
        </div>
      </div>
    </section>
  </main>

  <style>
    /* Scoped to the Registration Number block only — reuses the page's
       existing gold accent and font stack, no new design tokens. */
    .thank-you__reg-number {
      margin: 2rem auto;
      text-align: center;
    }
    .thank-you__reg-number-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #b8bfd1;
      margin: 0 0 0.5rem;
    }
    .thank-you__reg-number-value {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.75rem, 5vw, 2.75rem);
      font-weight: 500;
      color: #d4af6a;
      margin: 0;
      letter-spacing: 0.02em;
    }
  </style>

  <script>
    (function () {
      // Reinforces the replaceState() already done in registration-step2.js
      // right before the redirect. Calling it again here, on load, means
      // that even if this page is ever reached in a way that bypassed
      // that first replaceState (e.g. a bookmarked/shared link opened
      // fresh), the CURRENT history entry — whatever it is — gets
      // replaced with this same URL. That doesn't erase earlier history,
      // but it guarantees this page never re-adds a "back to the form"
      // step of its own, and makes the intended behavior consistent
      // regardless of how the page was reached.
      window.history.replaceState(null, '', window.location.href);

      var params = new URLSearchParams(window.location.search);
      var reg = params.get('reg');
      var wrap = document.getElementById('thankYouRegNumber');
      var valueEl = document.getElementById('thankYouRegNumberValue');
      if (!wrap || !valueEl) return;

      valueEl.textContent = reg ? reg : 'Registration Number Unavailable';
      wrap.hidden = false;
    })();
  </script>

  <script src="js/layout.js"></script>
  <script src="js/layout-loader.js"></script>
  <script src="js/translations.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/script.js" defer></script>
</body>
</html>
